<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KY · 주문관리 (관리자)</title>
<meta name="theme-color" content="#d97706">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, off }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ★ Firebase 설정 하드코딩 — 어느 기기에서든 자동 연결
  const DEFAULT_FB_CFG = {
    apiKey: "AIzaSyD9A3cbUujY4agOwB0OL45ccsfRhBXETMw",
    authDomain: "mymonth-6cd61.firebaseapp.com",
    databaseURL: "https://mymonth-6cd61-default-rtdb.firebaseio.com",
    projectId: "mymonth-6cd61",
    storageBucket: "mymonth-6cd61.firebasestorage.app",
    messagingSenderId: "1067760522796",
    appId: "1:1067760522796:web:f97a12c210482e6e8de389"
  };

  let savedCfg = DEFAULT_FB_CFG;
  try {
    const s1 = JSON.parse(localStorage.getItem('amt_firebase_cfg') || '{}');
    const s2 = JSON.parse(localStorage.getItem('ky_firebase_cfg') || '{}');
    if(s1.projectId) savedCfg = s1;
    else if(s2.projectId) savedCfg = s2;
  } catch(e){}

  // localStorage에도 저장
  try {
    if(!localStorage.getItem('amt_firebase_cfg'))
      localStorage.setItem('amt_firebase_cfg', JSON.stringify(DEFAULT_FB_CFG));
  } catch(e){}

  let app, db, firebaseReady = false;
  try {
    const appName = 'ky-admin';
    app = getApps().find(a => a.name === appName)
          || initializeApp({
              apiKey: savedCfg.apiKey, authDomain: savedCfg.authDomain,
              projectId: savedCfg.projectId, storageBucket: savedCfg.storageBucket,
              messagingSenderId: savedCfg.messagingSenderId, appId: savedCfg.appId,
              databaseURL: savedCfg.databaseURL
             }, appName);
    db = getDatabase(app);
    firebaseReady = true;
  } catch(e){ console.warn('Firebase init failed', e); }
  window._fb = { db, ref, set, get, onValue, off, ready: firebaseReady };
</script>

<style>
:root {
  --bg: #f5f6fa;
  --white: #fff;
  --surface2: #f8f9fc;
  --border: #e4e7ef;
  --shadow-sm: 0 1px 4px rgba(60,70,110,0.08);
  --shadow: 0 2px 12px rgba(60,70,110,0.10);
  --shadow-lg: 0 8px 32px rgba(60,70,110,0.13);
  --ky: #d97706;
  --ky-dark: #b45309;
  --ky-light: #fffbeb;
  --ky-mid: #fef3c7;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --red: #dc2626;
  --red-light: #fef2f2;
  --blue: #2563eb;
  --gray: #6b7280;
  --gray-light: #f3f4f6;
  --text: #111827;
  --text2: #4b5563;
  --text3: #9ca3af;
  --radius: 10px;
  --radius-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;font-weight:500;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5e0;border-radius:3px;}

.header{
  background:var(--ky);
  height:58px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(180,100,0,0.25);
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;color:#fff;
}
.logo-text{font-weight:800;font-size:1.05rem;color:#fff;}
.header-right{display:flex;align-items:center;gap:8px;}
.sync-badge{
  display:flex;align-items:center;gap:5px;
  font-size:.72rem;color:rgba(255,255,255,.85);
  background:rgba(255,255,255,.15);
  padding:4px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,.25);
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10b981;}
.sync-dot.off{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-dot.pulse{animation:pulse 2s infinite;}

.container{max-width:960px;margin:0 auto;padding:20px 16px;}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.kpi{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 14px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ky);}
.kpi-label{font-size:.72rem;color:var(--text2);font-weight:700;margin-bottom:5px;}
.kpi-value{font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:800;color:var(--ky);}
.kpi-sub{font-size:.7rem;color:var(--text3);margin-top:3px;}

.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:var(--radius-sm);
  font-family:inherit;font-size:.8rem;font-weight:600;
  cursor:pointer;border:1px solid transparent;transition:all .15s;
  white-space:nowrap;
}
.btn:active{transform:scale(.97);}
.btn-ky{background:var(--ky);color:#fff;border-color:var(--ky);}
.btn-ky:hover{background:var(--ky-dark);}
.btn-success{background:#15803d;color:#fff;font-weight:800;}
.btn-success:hover{background:#166534;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#b91c1c;}
.btn-ghost{background:var(--gray-light);color:var(--text2);border-color:var(--border);}
.btn-outline{background:#fff;color:var(--ky);border-color:var(--ky);}
.btn-ship{background:#1d4ed8;color:#fff;border-color:#1d4ed8;font-weight:800;}
.btn-ship:hover{background:#1e40af;}
.btn-sm{padding:7px 14px;font-size:.82rem;}
.btn-xs{padding:3px 8px;font-size:.7rem;}

.filter-bar{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  padding:12px 14px;background:var(--white);
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:14px;box-shadow:var(--shadow-sm);
}
select{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:inherit;font-size:.83rem;padding:7px 10px;
  outline:none;font-weight:600;cursor:pointer;
}
select:focus{border-color:var(--ky);}
input[type="date"],input[type="text"]{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:inherit;font-size:.83rem;padding:7px 10px;
  outline:none;font-weight:600;
}
input:focus{border-color:var(--ky);}

.badge{
  display:inline-flex;align-items:center;
  padding:3px 9px;border-radius:20px;
  font-size:.68rem;font-weight:700;white-space:nowrap;
}
.badge-pending{background:#fef3c7;color:#92400e;}
.badge-accepted{background:#d1fae5;color:#065f46;}
.badge-rejected{background:#fee2e2;color:#991b1b;}
.badge-shipped{background:#dbeafe;color:#1e40af;}

.orders-list{display:flex;flex-direction:column;gap:10px;}
.order-card{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s;
}
.order-card:hover{box-shadow:var(--shadow);}
.order-card.new-order{border-color:var(--ky);border-left:4px solid var(--ky);}
.order-card-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:12px;
}
.order-dealer{font-size:1rem;font-weight:700;color:var(--text);}
.order-meta{font-size:.73rem;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.order-items{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:12px;
}
.order-item-chip{
  background:var(--ky-light);
  border:1px solid var(--ky-mid);
  border-radius:8px;
  padding:5px 10px;
  font-size:.78rem;font-weight:700;color:var(--ky-dark);
}
.order-memo{
  font-size:.78rem;color:var(--text2);
  background:var(--surface2);border-radius:6px;
  padding:8px 10px;margin-bottom:12px;
  border-left:3px solid var(--ky-mid);
}
.order-actions{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  padding-top:10px;border-top:1px solid var(--border);
}
.order-total-chip{
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:.95rem;font-weight:800;color:var(--ky);
}

.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(17,24,39,.45);backdrop-filter:blur(3px);
  z-index:500;align-items:center;justify-content:center;padding:16px;
}
.modal-bg.open{display:flex;}
.modal{
  background:#fff;border-radius:16px;
  padding:24px;width:100%;max-width:420px;
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:modalIn .22s ease;
}
@keyframes modalIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{
  font-size:1rem;font-weight:700;color:var(--text);
  margin-bottom:18px;
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}
.close-btn{background:var(--gray-light);border:none;color:var(--text2);font-size:1rem;cursor:pointer;padding:5px 9px;border-radius:6px;}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem;}
.modal-row:last-child{border:none;}
textarea.note-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:inherit;font-size:.85rem;padding:10px 12px;
  outline:none;min-height:80px;resize:vertical;font-weight:500;
  margin:10px 0;
}
textarea.note-input:focus{border-color:var(--ky);}

.toast-wrap{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:8px;pointer-events:none;}
.toast{background:#1f2937;color:#fff;padding:10px 18px;border-radius:10px;font-size:.82rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:toastIn .2s ease;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.info{background:var(--ky);}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.empty{text-align:center;padding:60px 24px;color:var(--text3);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}
.empty-text{font-size:.9rem;font-weight:600;}

.new-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:#ef4444;color:#fff;
  padding:2px 7px;border-radius:10px;
  font-size:.62rem;font-weight:700;
  animation:pulse 1.5s infinite;
}

.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:8px;
}
.section-title{font-size:.95rem;font-weight:800;color:var(--text);}

.fb-warn{
  background:#fef3c7;border:1.5px solid #f59e0b;
  border-radius:var(--radius-sm);padding:12px 16px;
  font-size:.82rem;color:#92400e;font-weight:600;
  margin-bottom:16px;
}
</style>
</head>
<body>

<!-- ─── 관리자 로그인 화면 ─── -->
<div id="adminLoginScreen" style="
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;background:linear-gradient(145deg,#fffbeb,#fef3c7);padding:24px;
">
  <div style="width:72px;height:72px;border-radius:18px;background:var(--ky);display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:1.1rem;font-weight:700;color:#fff;box-shadow:0 8px 24px rgba(217,119,6,.35);margin-bottom:18px">KY</div>
  <div style="font-size:1.4rem;font-weight:900;color:var(--text);margin-bottom:6px">주문관리 시스템</div>
  <div style="font-size:.82rem;color:var(--text2);margin-bottom:28px">관리자 코드를 입력하세요</div>
  <div style="width:100%;max-width:320px;background:#fff;border-radius:16px;padding:24px;box-shadow:0 8px 32px rgba(60,70,110,.12);border:1px solid var(--border)">
    <label style="font-size:.78rem;font-weight:700;display:block;margin-bottom:6px">관리자 코드</label>
    <input type="password" id="adminCodeInput" placeholder="코드 입력"
      style="width:100%;background:var(--surface2,#f8f9fc);border:2px solid var(--border);border-radius:8px;
        color:var(--text);font-family:inherit;font-size:1rem;padding:12px 14px;
        outline:none;transition:border-color .15s;font-weight:700;text-align:center;letter-spacing:4px;margin-bottom:14px"
      onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button onclick="doAdminLogin()" style="width:100%;background:var(--ky);color:#fff;border:none;border-radius:8px;padding:12px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s">
      🔑 로그인
    </button>
    <div id="adminLoginMsg" style="text-align:center;font-size:.78rem;color:var(--red,#dc2626);margin-top:10px;min-height:18px"></div>
  </div>
</div>

<!-- ─── 메인 앱 (로그인 후 표시) ─── -->
<div id="adminMainApp" style="display:none">

<div class="header">
  <div class="logo">
    <div class="logo-icon">KY</div>
    <div class="logo-text">주문관리 · 관리자</div>
  </div>
  <div class="header-right">
    <div class="sync-badge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">연결중...</span>
    </div>
    <span id="adminNameBadge" style="font-size:.72rem;color:rgba(255,255,255,.9);background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.25)">👤 ─</span>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)" onclick="manualRefresh()">🔄</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)" onclick="adminLogout()">🚪</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)" onclick="toggleAdminSettings()">⚙️</button>
  </div>
</div>

<!-- ── 관리자 설정 패널 ── -->
<div id="adminSettingsPanel" style="display:none;background:#fff;border-bottom:2px solid var(--border);padding:20px 16px;max-width:960px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="font-size:.95rem;font-weight:800">⚙️ 코드 관리</span>
    <button class="btn btn-ghost btn-sm" onclick="toggleAdminSettings()">닫기 ✕</button>
  </div>

  <!-- 관리자 코드 -->
  <div style="margin-bottom:18px">
    <div style="font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">👤 관리자 코드</div>
    <button class="btn btn-outline btn-sm" onclick="loadAdminCodes()" style="margin-bottom:10px">🔄 목록 불러오기</button>
    <div id="adminCodeListWrap" style="margin-bottom:12px;max-height:200px;overflow-y:auto"></div>
    <div style="background:var(--surface2,#f8f9fc);border-radius:8px;padding:12px;border:1px solid var(--border)">
      <div style="font-size:.75rem;font-weight:700;margin-bottom:8px;color:var(--text2)">+ 새 관리자</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input type="text" id="newAdminName" placeholder="이름" style="flex:1;min-width:80px">
        <input type="text" id="newAdminCode" placeholder="코드" style="flex:1;min-width:80px">
        <button class="btn btn-ky btn-sm" onclick="addAdminCode()">추가</button>
      </div>
    </div>
  </div>

  <!-- 대리점 코드 -->
  <div style="margin-bottom:18px;padding-top:14px;border-top:1px solid var(--border)">
    <div style="font-size:.82rem;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">🏢 대리점 코드</div>
    <button class="btn btn-outline btn-sm" onclick="loadDealerCodes()" style="margin-bottom:10px">🔄 목록 불러오기</button>
    <div id="dealerCodeListWrap" style="max-height:200px;overflow-y:auto"></div>
  </div>

  <!-- 승인 요청 -->
  <div style="padding:10px 12px;background:var(--ky-light,#fffbeb);border-radius:8px;border:1px solid var(--ky-mid,#fef3c7);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <span style="font-size:.78rem;color:#92400e">코드를 모를 경우 관리자에게 승인 요청</span>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm" style="background:var(--ky);color:#fff;border:none" onclick="requestCodeChange('관리자')">📧 관리자 코드</button>
      <button class="btn btn-sm" style="background:var(--ky);color:#fff;border:none" onclick="requestCodeChange('대리점')">📧 대리점 코드</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="fb-warn" id="fbWarn" style="display:none">
    ⚠️ Firebase 미연결 — AMT 앱에서 Firebase 설정을 먼저 저장하거나, 아래에서 직접 설정하세요.
    <br><button class="btn btn-sm btn-ky" style="margin-top:8px" onclick="document.getElementById('fbSetupSection').style.display='block'">Firebase 설정하기</button>
  </div>

  <div id="fbSetupSection" style="display:none;margin-bottom:16px">
    <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px">
      <div style="font-weight:700;margin-bottom:10px">Firebase 설정</div>
      <input type="text" id="a_apiKey" placeholder="apiKey" style="margin-bottom:6px">
      <input type="text" id="a_authDomain" placeholder="authDomain" style="margin-bottom:6px">
      <input type="text" id="a_projectId" placeholder="projectId" style="margin-bottom:6px">
      <input type="text" id="a_databaseURL" placeholder="databaseURL (필수)" style="margin-bottom:6px">
      <input type="text" id="a_storageBucket" placeholder="storageBucket" style="margin-bottom:6px">
      <input type="text" id="a_messagingSenderId" placeholder="messagingSenderId" style="margin-bottom:6px">
      <input type="text" id="a_appId" placeholder="appId" style="margin-bottom:10px">
      <button class="btn btn-ky" onclick="saveAdminFb()">💾 저장 후 새로고침</button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">전체 주문</div><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-sub">건</div></div>
    <div class="kpi"><div class="kpi-label">⏳ 대기중</div><div class="kpi-value" id="kpiPending" style="color:var(--ky)">0</div><div class="kpi-sub">건</div></div>
    <div class="kpi"><div class="kpi-label">✅ 접수완료</div><div class="kpi-value" id="kpiAccepted" style="color:var(--green)">0</div><div class="kpi-sub">건</div></div>
    <div class="kpi"><div class="kpi-label">이번달 금액</div><div class="kpi-value" id="kpiAmt">0</div><div class="kpi-sub">원</div></div>
  </div>

  <div class="filter-bar">
    <select id="fStatus" onchange="applyFilter()">
      <option value="">전체 상태</option>
      <option value="pending">대기중</option>
      <option value="accepted">접수완료</option>
      <option value="shipped">출고완료</option>
    </select>
    <select id="fDealer" onchange="applyFilter()">
      <option value="">전체 대리점</option>
    </select>
    <input type="date" id="fFrom" onchange="applyFilter()" title="시작일">
    <input type="date" id="fTo" onchange="applyFilter()" title="종료일">
    <button class="btn btn-ghost btn-sm" onclick="resetFilter()">초기화</button>
  </div>

  <div class="section-header">
    <div class="section-title">
      주문 목록
      <span id="newOrderBadge" class="new-badge" style="display:none">🔔 새 주문</span>
    </div>
    <span id="orderCount" style="font-size:.8rem;color:var(--text3)"></span>
  </div>

  <div class="orders-list" id="ordersList">
    <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">불러오는 중...</div></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-title">
      주문 상세
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailContent"></div>
    <div id="actionArea" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)"></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let allOrders = [];
let filteredOrders = [];
let _listener = null;
let _metaListener = null;
let _manualRefreshTimer = null;
let prevPendingIds = new Set();
let _currentDetailId = null;
const KY_MUTATION_META_PATH = 'ky_orders_meta/lastMutation';

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function fmt(n){ return Number(n||0).toLocaleString('ko-KR'); }
function today(){ return new Date().toISOString().slice(0,10); }
function ym(d){ return (d||'').slice(0,7); }
function kyOrderSortStamp(order){ return order?.updatedAt || order?.statusUpdatedAt || order?.createdAt || ''; }
function sortKyOrdersDesc(list){
  return [...(list||[])].sort((a,b) => kyOrderSortStamp(b).localeCompare(kyOrderSortStamp(a)) || (b.orderDate||'').localeCompare(a.orderDate||''));
}
async function touchKyMutation(kind, orderId, extra={}){
  const fb = window._fb;
  if(!fb || !fb.ready) return;
  try{
    await fb.set(fb.ref(fb.db, KY_MUTATION_META_PATH), {
      kind,
      orderId: orderId || '',
      source: 'KY_ADMIN',
      at: new Date().toISOString(),
      ...extra
    });
  }catch(err){
    console.warn('KY 관리자 meta 저장 실패:', err);
  }
}
function queueManualRefresh(reason='sync', delay=100){
  clearTimeout(_manualRefreshTimer);
  _manualRefreshTimer = setTimeout(() => manualRefresh(reason), delay);
}

function toast(msg, type='info'){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; }, 2800);
  setTimeout(()=>el.remove(), 3200);
}

function setSync(on, label){
  const dot = document.getElementById('syncDot');
  const lb = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (on ? ' pulse' : ' off');
  if(label) lb.textContent = label;
}

/* ═══════════════════════════════════════════════
   FIREBASE SETUP
═══════════════════════════════════════════════ */
function saveAdminFb(){
  const cfg = {};
  ['apiKey','authDomain','projectId','databaseURL','storageBucket','messagingSenderId','appId'].forEach(k=>{
    const el = document.getElementById('a_'+k);
    if(el) cfg[k] = el.value.trim();
  });
  if(!cfg.projectId||!cfg.databaseURL||!cfg.apiKey){ alert('projectId, databaseURL, apiKey 필수'); return; }
  localStorage.setItem('amt_firebase_cfg', JSON.stringify(cfg));
  localStorage.setItem('ky_firebase_cfg', JSON.stringify(cfg));
  alert('저장됐습니다. 새로고침합니다.');
  location.reload();
}

/* ═══════════════════════════════════════════════
   LOAD & LISTEN
═══════════════════════════════════════════════ */
function init(){
  const fb = window._fb;
  if(!fb || !fb.ready){
    document.getElementById('fbWarn').style.display = 'block';
    setSync(false, '미연결');
    document.getElementById('ordersList').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Firebase 미연결</div></div>';
    return;
  }
  setSync(true, '연결됨');
  startListener();
}

function startListener(){
  const fb = window._fb;
  if(!fb || !fb.ready) return;

  if(!_listener){
    let firstLoad = true;
    _listener = fb.onValue(fb.ref(fb.db, 'ky_orders'), (snap) => {
      if(!snap.exists()){
        allOrders = [];
        renderOrders([]);
        updateKpi([]);
        return;
      }
      const data = snap.val();
      // ★ 취소 주문도 데이터는 유지하되 필터링은 renderOrders에서 처리
      const incoming = sortKyOrdersDesc(Object.values(data));

      // ★ 새 주문 감지 (대기중인 새 주문) — 전체 사용자에게 알림
      if(!firstLoad){
        const newPending = incoming.filter(o => o.status === 'pending' && !prevPendingIds.has(o.id));
        if(newPending.length > 0){
          newPending.forEach(o => {
            const msg = `🔔 새 주문: ${o.dealerName} — ${(o.items||[]).map(i=>i.product+'×'+i.qty).join(', ')} | ${fmt(o.total)}원`;
            toast(msg, 'info');

            if(Notification && Notification.permission === 'granted'){
              new Notification('📦 KY 새 주문!', {
                body: `${o.dealerName}
${(o.items||[]).map(i=>i.product+' '+i.qty+'개').join(', ')}
합계: ${fmt(o.total)}원`,
                icon: '/KY-order/icon-192.png',
                badge: '/KY-order/icon-192.png',
                tag: 'ky-neworder-' + o.id,
                requireInteraction: true
              });
            } else if(Notification && Notification.permission === 'default'){
              Notification.requestPermission().then(perm => {
                if(perm === 'granted'){
                  new Notification('📦 KY 새 주문!', {
                    body: `${o.dealerName} | ${fmt(o.total)}원`,
                    icon: '/KY-order/icon-192.png',
                    tag: 'ky-neworder-' + o.id
                  });
                }
              });
            }
            showNewOrderPopup(o);
          });
          document.getElementById('newOrderBadge').style.display = 'inline-flex';
          setTimeout(()=>{ document.getElementById('newOrderBadge').style.display='none'; }, 15000);
        }
      }

      prevPendingIds = new Set(incoming.filter(o=>o.status==='pending').map(o=>o.id));
      allOrders = incoming;
      firstLoad = false;

      updateDealerFilter();
      applyFilter();
      updateKpi(incoming);
      setSync(true, '실시간');
    });
  }

  if(!_metaListener){
    _metaListener = fb.onValue(fb.ref(fb.db, KY_MUTATION_META_PATH), (snap) => {
      if(!snap.exists()) return;
      queueManualRefresh('meta', 70);
    });
  }

  if(!window.__kyAdminAutoRefreshBound){
    window.__kyAdminAutoRefreshBound = true;
    window.addEventListener('focus', () => queueManualRefresh('focus', 0));
    window.addEventListener('pageshow', () => queueManualRefresh('pageshow', 0));
    document.addEventListener('visibilitychange', () => {
      if(document.visibilityState === 'visible') queueManualRefresh('visible', 0);
    });
  }

  if(Notification && Notification.permission === 'default'){
    Notification.requestPermission();
  }
}

function manualRefresh(reason='manual'){
  const fb = window._fb;
  if(!fb||!fb.ready){ toast('Firebase 미연결','error'); return; }
  if(reason === 'manual') toast('새로고침 중...','info');
  fb.get(fb.ref(fb.db,'ky_orders')).then(snap=>{
    if(!snap.exists()){ allOrders=[]; renderOrders([]); updateKpi([]); return; }
    allOrders = sortKyOrdersDesc(Object.values(snap.val()));
    updateDealerFilter();
    applyFilter();
    updateKpi(allOrders);
    if(reason === 'manual') toast('완료','success');
  }).catch(e=>toast('실패: '+e.message,'error'));
}

/* ═══════════════════════════════════════════════
   FILTER
═══════════════════════════════════════════════ */
function updateDealerFilter(){
  const sel = document.getElementById('fDealer');
  const cur = sel.value;
  const dealers = [...new Set(allOrders.map(o=>o.dealerName))].sort();
  sel.innerHTML = '<option value="">전체 대리점</option>' +
    dealers.map(d=>`<option value="${d}" ${d===cur?'selected':''}>${d}</option>`).join('');
}

function applyFilter(){
  const status = document.getElementById('fStatus').value;
  const dealer = document.getElementById('fDealer').value;
  const from = document.getElementById('fFrom').value;
  const to = document.getElementById('fTo').value;

  let list = [...allOrders];
  if(status) list = list.filter(o => o.status === status);
  if(dealer) list = list.filter(o => o.dealerName === dealer);
  if(from) list = list.filter(o => o.orderDate >= from);
  if(to) list = list.filter(o => o.orderDate <= to);

  filteredOrders = list;
  renderOrders(list);
  document.getElementById('orderCount').textContent = list.length + '건';
}

function resetFilter(){
  document.getElementById('fStatus').value = '';
  document.getElementById('fDealer').value = '';
  document.getElementById('fFrom').value = '';
  document.getElementById('fTo').value = '';
  applyFilter();
}

/* ═══════════════════════════════════════════════
   RENDER ORDERS
═══════════════════════════════════════════════ */
function updateKpi(list){
  const mo = ym(today());
  // ★ 취소 제외
  const active = list.filter(o => o.status !== 'cancelled');
  document.getElementById('kpiTotal').textContent = fmt(active.length);
  document.getElementById('kpiPending').textContent = fmt(active.filter(o=>o.status==='pending').length);
  document.getElementById('kpiAccepted').textContent = fmt(active.filter(o=>o.status==='accepted').length);
  const moAmt = active.filter(o=>o.orderDate.startsWith(mo)).reduce((s,o)=>s+o.total,0);
  document.getElementById('kpiAmt').textContent = fmt(moAmt);
}

const statusMap = {
  pending:  {label:'대기중', cls:'badge-pending'},
  accepted: {label:'접수완료', cls:'badge-accepted'},
  shipped:  {label:'출고완료', cls:'badge-shipped'},
  received: {label:'반품입고완료', cls:'badge-accepted'},
  cancelled:{label:'취소됨', cls:'badge-pending'}
};

function renderOrders(list){
  const el = document.getElementById('ordersList');
  const visible = list.filter(o => o.status !== 'cancelled');
  if(!visible.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">주문이 없습니다</div></div>';
    return;
  }

  el.innerHTML = visible.map(o => {
    const s = statusMap[o.status] || {label:o.status, cls:'badge-pending'};
    const isNew = o.status === 'pending';
    const isReturn = o.orderType === 'return';
    const isExchange = o.orderType === 'exchange';
    const itemChips = (o.items||[]).map(i =>
      `<div class="order-item-chip">📦 ${i.product} ${fmt(i.qty)}개 · ${fmt(i.total)}원</div>`
    ).join('');
    const createdTime = o.createdAt ? new Date(o.createdAt).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const typeTag = o.orderType && o.orderType !== 'order'
      ? `<span style="font-size:.62rem;padding:1px 7px;border-radius:10px;font-weight:700;background:${o.orderType==='return'?'#fef3c7':'#eff6ff'};color:${o.orderType==='return'?'#92400e':'#1e40af'}">${o.orderType==='return'?'반품':'교환'}</span>` : '';

    let actionHtml = '';
    if(o.status === 'pending'){
      actionHtml = `
        <button class="btn btn-success btn-sm" onclick="openAction('${o.id}','accepted')">✅ 접수</button>
        ${isReturn
          ? `<button class="btn btn-outline btn-sm" style="color:#16a34a;border-color:#16a34a" onclick="openAction('${o.id}','received')">📥 입고처리</button>`
          : `<button class="btn btn-ship btn-sm" onclick="openAction('${o.id}','shipped')">🚚 ${isExchange?'교환처리':'출고'}</button>`}
      `;
    }else if(o.status === 'accepted'){
      actionHtml = `
        ${isReturn
          ? `<button class="btn btn-outline btn-sm" style="color:#16a34a;border-color:#16a34a" onclick="openAction('${o.id}','received')">📥 입고처리</button>`
          : `<button class="btn btn-ship btn-sm" onclick="openAction('${o.id}','shipped')">🚚 ${isExchange?'교환처리':'출고처리'}</button>`}
        <button class="btn btn-ghost btn-sm" onclick="openAction('${o.id}','pending')">↩ 대기로</button>
      `;
    }else if(o.status === 'shipped' || o.status === 'received'){
      actionHtml = `<button class="btn btn-ghost btn-sm" onclick="openAction('${o.id}','accepted')">↩ 접수로</button>`;
    }

    return `<div class="order-card ${isNew?'new-order':''}" id="oc_${o.id}">
      <div class="order-card-top">
        <div>
          <div class="order-dealer">${o.dealerName}${isNew?'<span class="new-badge" style="margin-left:8px;font-size:.58rem">NEW</span>':''} ${typeTag}</div>
          <div class="order-meta">${o.id} · ${o.orderDate} ${createdTime}</div>
        </div>
        <span class="badge ${s.cls}">${s.label}</span>
      </div>
      <div class="order-items">${itemChips}</div>
      ${o.memo ? `<div class="order-memo">💬 ${o.memo}</div>` : ''}
      ${o.statusNote ? `<div class="order-memo" style="border-color:var(--ky)">📝 ${o.statusNote}${o.processedBy?' · <b>'+o.processedBy+'</b>':''}</div>` : ''}
      <div class="order-actions">
        ${actionHtml}
        <div class="order-total-chip">${fmt(o.total)}원</div>
      </div>
    </div>`;
  }).join('');
}


/* ═══════════════════════════════════════════════
   ORDER ACTIONS
═══════════════════════════════════════════════ */
function openAction(orderId, targetStatus){
  const o = allOrders.find(x => x.id === orderId);
  if(!o) return;
  _currentDetailId = orderId;
  const isReturn = o.orderType === 'return';
  const isExchange = o.orderType === 'exchange';

  const statusLabels = {
    accepted: '접수 완료 처리',
    shipped: isExchange ? '교환 처리' : '출고 완료 처리',
    received: '반품 입고 처리',
    pending: '대기중으로 되돌리기'
  };
  const statusColors = {
    accepted: 'var(--green)',
    shipped: 'var(--blue)',
    received: 'var(--green)',
    pending: 'var(--gray)'
  };

  const itemRows = (o.items||[]).map(i=>
    `<div class="modal-row">
      <span>${i.product}</span>
      <span style="font-weight:700">${fmt(i.qty)}개 · ${fmt(i.total)}원</span>
    </div>`
  ).join('');

  let actionGuide = '';
  if(targetStatus === 'shipped' && !isReturn && !isExchange){
    actionGuide = `<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:.78rem;color:#1e40af">🚚 출고 처리 시 자동 실행:<br>① KY 재고 차감 ② AMT 발주 등록 ③ 수금관리 등록</div>`;
  }else if(targetStatus === 'received' && isReturn){
    actionGuide = `<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:.78rem;color:#15803d">📥 반품 입고 처리 시 자동 실행:<br>① KY 재고 증가 ② AMT 반품매출 등록 ③ 수금관리 반품차감 반영</div>`;
  }else if(targetStatus === 'shipped' && isExchange){
    actionGuide = `<div style="background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:.78rem;color:#854d0e">🔁 교환 처리: 재고·매출·수금 변동 없이 상태만 변경됩니다.</div>`;
  }

  document.getElementById('detailContent').innerHTML = `
    <div class="modal-row"><span>대리점</span><span style="font-weight:700">${o.dealerName}</span></div>
    <div class="modal-row"><span>주문일</span><span>${o.orderDate}</span></div>
    ${itemRows}
    ${o.memo ? `<div class="modal-row"><span>메모</span><span style="font-size:.8rem">${o.memo}</span></div>` : ''}
    <div class="modal-row" style="padding-top:12px;font-weight:800">
      <span>합계</span>
      <span style="color:var(--ky);font-size:1rem">${fmt(o.total)}원</span>
    </div>
  `;

  document.getElementById('actionArea').innerHTML = `
    <div style="font-weight:700;margin-bottom:8px;color:${statusColors[targetStatus]||'var(--text)'}">
      → ${statusLabels[targetStatus]||targetStatus}
    </div>
    ${actionGuide}
    <textarea class="note-input" id="actionNote" placeholder="대리점에 전달할 메모 (선택사항)...">${o.statusNote||''}</textarea>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeDetail()">취소</button>
      <button class="btn btn-ky" style="flex:2;background:${statusColors[targetStatus]||'var(--ky)'}; border-color:${statusColors[targetStatus]||'var(--ky)'}" onclick="confirmAction('${orderId}','${targetStatus}')">
        확인 — ${statusLabels[targetStatus]||targetStatus}
      </button>
    </div>
  `;

  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

async function confirmAction(orderId, targetStatus){
  const fb = window._fb;
  if(!fb||!fb.ready){ toast('Firebase 미연결','error'); return; }

  const note = (document.getElementById('actionNote')||{value:''}).value.trim();
  const o = allOrders.find(x => x.id === orderId);
  if(!o){ toast('주문을 찾을 수 없습니다','error'); return; }

  const confirmBtn = document.querySelector('#actionArea .btn-ky');
  if(confirmBtn){ confirmBtn.disabled = true; confirmBtn.textContent = '처리 중...'; }

  // ★ 타임아웃 30초 — 오래 걸려도 버튼이 영원히 먹통이 되지 않도록
  let _timedOut = false;
  const _timeout = setTimeout(() => {
    _timedOut = true;
    if(confirmBtn){ confirmBtn.disabled = false; confirmBtn.textContent = '확인'; }
    toast('⚠️ 처리 시간이 너무 걸립니다. 새로고침 후 다시 시도하세요.', 'error');
  }, 30000);

  try{
    const now = new Date().toISOString();
    const updated = {
      ...o,
      status: targetStatus,
      statusNote: note,
      statusUpdatedAt: now,
      processedBy: window._adminName || '─'
    };
    await fb.set(fb.ref(fb.db, 'ky_orders/' + orderId), updated);
    await touchKyMutation('status', orderId, { status: targetStatus, dealerId: o.dealerId || '' });

    if(targetStatus === 'shipped' && o.orderType !== 'return' && o.orderType !== 'exchange'){
      await autoUpdateAmtOnShipped(o, note, now);
    }
    if(targetStatus === 'received' && o.orderType === 'return'){
      await autoUpdateAmtOnReturn(o, note, now);
    }
    if(targetStatus === 'shipped' && o.orderType === 'exchange'){
      toast('🔁 교환 처리 완료 (재고·매출 변동 없음)', 'success');
    }

    if(_timedOut) return; // 타임아웃 이미 처리됨

    const statusLabel = {accepted:'접수완료',shipped:'출고완료',received:'반품입고완료',pending:'대기중'};
    const notifMsg = `[KY주문] ${o.dealerName} → ${statusLabel[targetStatus]||targetStatus} | ${(o.items||[]).map(i=>i.product+'×'+i.qty).join(', ')} | ${fmt(o.total)}원`;
    await fb.set(fb.ref(fb.db, 'amt_notifications/ky_' + orderId + '_' + targetStatus), {
      type: 'ky_order',
      message: notifMsg,
      orderId: orderId,
      dealerName: o.dealerName,
      status: targetStatus,
      at: now,
      read: false
    });

    sendTelegramStatus(o, targetStatus, note, now).catch(() => {});

    toast('✅ ' + o.dealerName + ' 주문 → ' + (statusLabel[targetStatus]||targetStatus), 'success');
    closeDetail();
  } catch(e){
    toast('❌ 처리 실패: ' + e.message, 'error');
  } finally {
    // ★ 성공/실패 모두 타임아웃 취소 + 버튼 반드시 복원
    clearTimeout(_timeout);
    if(confirmBtn && !_timedOut){
      confirmBtn.disabled = false;
      confirmBtn.textContent = '확인';
    }
  }
}


/* ═══════════════════════════════════════════════════════
   ★ 텔레그램 알림 (orders-admin-KY)
   ※ index-AMT.html의 TELEGRAM_BOT_TOKEN / SUPER_ADMIN_CHAT_ID 와
      같은 값을 아래에도 입력하세요.
═══════════════════════════════════════════════════════ */
const ADMIN_TELEGRAM_BOT_TOKEN  = '8615303756:AAEWCz82f6LBzgBx769v1xbUkJ6SOM7rpjk';  // KY 주문 봇
const ADMIN_SUPER_CHAT_ID       = '1988388217';  // 총관리자 채팅 ID
// 나중에 추가할 관리자 채팅 ID
// const ADMIN2_CHAT_ID = '';
// const ADMIN3_CHAT_ID = '';

async function sendTelegramAdmin(chatId, text){
  if(!ADMIN_TELEGRAM_BOT_TOKEN || !chatId){
    console.warn('[텔레그램-Admin] 봇 토큰 또는 채팅 ID 미설정');
    return;
  }
  try{
    const res = await fetch('https://api.telegram.org/bot' + ADMIN_TELEGRAM_BOT_TOKEN + '/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'HTML' })
    });
    const data = await res.json();
    if(!data.ok) console.warn('[텔레그램-Admin] 발송 실패:', data.description);

/* ═══════════════════════════════════════════════
   ★ 출고 시 AMT 자동 업데이트
   - KY 재고 차감 (invLogs)
   - AMT 발주(orders) 추가
   - 수금관리(orders) 연동
═══════════════════════════════════════════════ */
async function autoUpdateAmtOnShipped(order, note, now){
  const fb = window._fb;
  if(!fb||!fb.ready) return;

  try{
    const snap = await fb.get(fb.ref(fb.db, 'amt_data'));
    if(!snap.exists()){ toast('⚠️ AMT 데이터 없음 - 재고 자동 업데이트 실패','error'); return; }

    const data = snap.val();
    const invLogs = data.invLogs || [];
    const amtOrders = data.orders || [];
    const dealers = data.dealers || [];
    const dealer = dealers.find(d => d.id === order.dealerId || d.name === order.dealerName);

    for(const item of (order.items||[])){
      const lineId = 'ord_ky_' + order.id + '_' + item.product.replace(/\s/g,'_');
      const invId = 'inv_ky_ship_' + order.id + '_' + item.product.replace(/\s/g,'_');
      const invPayload = {
        id: invId,
        date: order.orderDate || now.slice(0,10),
        product: item.product,
        qty: -Math.abs(item.qty),
        type: 'out',
        company: 'KY',
        memo: `[KY주문출고] ${order.dealerName} 주문 #${order.id}`,
        relOrder: lineId,
        relKyOrder: order.id,
        relKyProduct: item.product,
        createdAt: invLogs.find(i=>i.id===invId)?.createdAt || now
      };
      const invIdx = invLogs.findIndex(i => i.id===invId || (i.relKyOrder===order.id && (i.relKyProduct||i.product)===item.product && Number(i.qty)<0));
      if(invIdx >= 0) invLogs[invIdx] = { ...invLogs[invIdx], ...invPayload };
      else invLogs.push(invPayload);
    }

    if(dealer){
      for(const item of (order.items||[])){
        const lineId = 'ord_ky_' + order.id + '_' + item.product.replace(/\s/g,'_');
        const dp = (dealer.products||[]).find(p => p.product === item.product);
        const price = dp ? dp.price : item.price;
        const dueDate = calcDueDate(order.orderDate || now.slice(0,10), dealer.term || 'eom');
        const existingIdx = amtOrders.findIndex(o => o.id === lineId || (o.relKyOrder===order.id && !(o.isReturn||o.orderType==='return') && (o.relKyProduct||o.product)===item.product));
        const newOrder = {
          id: lineId,
          dealerId: order.dealerId,
          dealerName: order.dealerName,
          product: item.product,
          qty: Math.abs(item.qty),
          price: price,
          total: price * Math.abs(item.qty),
          fee: 0,
          orderDate: order.orderDate || now.slice(0,10),
          dueDate: dueDate,
          status: 'pending',
          memo: `[KY주문자동] ${note||''}`,
          relKyOrder: order.id,
          relKyProduct: item.product,
          createdAt: existingIdx >= 0 ? (amtOrders[existingIdx].createdAt||now) : now
        };
        if(existingIdx >= 0) amtOrders[existingIdx] = { ...amtOrders[existingIdx], ...newOrder };
        else amtOrders.push(newOrder);
      }
    }

    await fb.set(fb.ref(fb.db, 'amt_data/invLogs'), invLogs);
    await fb.set(fb.ref(fb.db, 'amt_data/orders'), amtOrders);
    await fb.set(fb.ref(fb.db, 'amt_data/_updatedAt'), now);

    toast('✅ 출고 완료 — KY재고 차감 + AMT 발주/수금 자동 등록!', 'success');
  } catch(e){
    console.error('AMT 자동 업데이트 실패:', e);
    toast('⚠️ 출고는 됐으나 AMT 자동업데이트 실패: ' + e.message, 'error');
  }
}

/* ★ 공휴일/주말 판단용 (KR_HOLIDAYS 없어도 주말만이라도 처리) */
const KR_HOLIDAYS_ADMIN = new Set([
  '2025-01-01','2025-01-28','2025-01-29','2025-01-30',
  '2025-03-01','2025-05-05','2025-05-06','2025-06-06',
  '2025-08-15','2025-10-03','2025-10-06','2025-10-07','2025-10-08','2025-12-25',
  '2026-01-01','2026-01-28','2026-01-29','2026-01-30',
  '2026-03-01','2026-03-02','2026-05-05','2026-06-06',
  '2026-08-17','2026-09-24','2026-09-25','2026-09-26',
  '2026-10-03','2026-10-05','2026-10-09','2026-12-25',
  '2027-01-01','2027-02-17','2027-02-18','2027-02-19',
  '2027-03-01','2027-05-05','2027-05-24','2027-06-06','2027-06-07',
  '2027-08-15','2027-08-16','2027-10-03','2027-10-09','2027-10-14','2027-10-15',
  '2027-12-25','2027-12-27',
]);
function isNonBizAdmin(ds){
  const d = new Date(ds+'T00:00:00'); const dow = d.getDay();
  return dow===0 || dow===6 || KR_HOLIDAYS_ADMIN.has(ds);
}
function addDaysAdmin(ds, n){
  const d = new Date(ds+'T00:00:00'); d.setDate(d.getDate()+n);
  return localFmtAdmin(d);
}
function nextBizAdmin(ds){
  let cur = ds;
  while(isNonBizAdmin(cur)){ cur = addDaysAdmin(cur,1); }
  return cur;
}

function localFmtAdmin(dt){
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth()+1).padStart(2,'0');
  const dd = String(dt.getDate()).padStart(2,'0');
  return yy+'-'+mm+'-'+dd;
}
function calcDueDate(orderDate, term){
  const d = new Date(orderDate+'T00:00:00');
  const y = d.getFullYear(), m = d.getMonth();
  // ★ localFmtAdmin으로 UTC 오프셋 버그 방지 + nextBizAdmin으로 휴일 다음 영업일 처리
  if(term === 'same') return nextBizAdmin(orderDate);
  if(term === 'same_next'){
    const next = new Date(d); next.setDate(next.getDate()+1);
    return nextBizAdmin(localFmtAdmin(next));
  }
  if(term === 'eom'){
    return nextBizAdmin(localFmtAdmin(new Date(y, m+1, 0)));
  }
  if(term === 'eom_next'){
    return nextBizAdmin(localFmtAdmin(new Date(y, m+2, 0)));
  }
  if(term === '3m_19'){
    return nextBizAdmin(localFmtAdmin(new Date(y, m+3, 19)));
  }
  return nextBizAdmin(localFmtAdmin(new Date(y, m+2, 0)));
}

const ADMIN_SESSION_KEY = 'ky_admin_session';

async function doAdminLogin(){
  const code = (document.getElementById('adminCodeInput').value||'').trim();
  if(!code){ setAdminMsg('코드를 입력하세요.'); return; }

  const fb = window._fb;
  if(!fb||!fb.ready){
    // Firebase 미연결 시 localStorage amt_pw fallback
    const localPw = {};
    try{ Object.assign(localPw, JSON.parse(localStorage.getItem('amt_pw')||'{}')); }catch(e){}
    const matched = Object.entries(localPw).find(([k,v]) => v === code);
    if(matched){
      setAdminSession(matched[0], code);
      showAdminApp();
      return;
    }
    setAdminMsg('❌ 코드가 틀렸습니다.');
    return;
  }

  try{
    const snap = await fb.get(fb.ref(fb.db,'amt_pw'));
    if(!snap.exists()){ setAdminMsg('⚠️ 관리자 코드 미설정'); return; }
    const pwData = snap.val();
    // pwData: { "홍길동": "1234", "김철수": "5678", ... }
    const matched = Object.entries(pwData).find(([name, pw]) => String(pw) === String(code));
    if(!matched){ setAdminMsg('❌ 코드가 틀렸습니다.'); return; }
    setAdminSession(matched[0], code);
    showAdminApp();
  }catch(e){
    setAdminMsg('❌ 오류: '+e.message);
  }
}

function setAdminSession(name, code){
  sessionStorage.setItem(ADMIN_SESSION_KEY, name);
  window._adminName = name;
  // ★ 자동 로그인: localStorage에 코드 저장 (다음 접속 시 자동 입력)

    localStorage.setItem('ky_admin_saved_code', code);
    localStorage.setItem('ky_admin_saved_name', name);
  }
  const badge = document.getElementById('adminNameBadge');
  if(badge) badge.textContent = '👤 '+name;
}

function loadDealerCodes(){
  const fb = window._fb;

async function saveDealerCode(idx, dealerId){
  const fb = window._fb;
  if(!fb||!fb.ready){ alert('Firebase 미연결'); return; }
  const newCode = (document.getElementById('dcode_'+idx).value||'').trim();
  if(!newCode){ alert('코드를 입력하세요'); return; }

  try{
    // ★ 전체 amt_data를 읽어서 code만 업데이트 후 전체 저장
    // (부분 저장하면 AMT 앱의 fbSaveAll이 덮어쓰는 문제 방지)
    const snap = await fb.get(fb.ref(fb.db,'amt_data'));
    if(!snap.exists()){ alert('데이터 없음'); return; }
    const data = snap.val();
    const dealers = data.dealers||[];
    const di = dealers.findIndex(d=>d.id===dealerId);
    if(di<0){ alert('대리점을 찾을 수 없습니다'); return; }
    dealers[di].code = newCode;
    // ★ 전체 amt_data를 _updatedAt 갱신과 함께 저장
    data.dealers = dealers;
    data._updatedAt = new Date().toISOString();
    await fb.set(fb.ref(fb.db,'amt_data'), data);
    toast('✅ '+dealers[di].name+' 코드 → '+newCode,'success');
    // UI 새로고침
    loadDealerCodes();
  }catch(e){
    alert('저장 실패: '+e.message);
  }
}

    'position:fixed','bottom:24px','right:20px','z-index:9999',
    'background:#fff','border:2.5px solid var(--ky)','border-radius:16px',
    'padding:18px 20px','min-width:270px','max-width:340px',
    'box-shadow:0 8px 36px rgba(217,119,6,.35)'
  ].join(';');

  const itemsText = (order.items||[]).map(i => i.product + ' ' + fmt(i.qty) + '개').join(' · ');
  const typeTag = order.orderType && order.orderType !== 'order'
    ? `<span style="margin-left:6px;font-size:.62rem;padding:2px 7px;border-radius:10px;font-weight:700;background:${order.orderType==='return'?'#fef3c7':'#eff6ff'};color:${order.orderType==='return'?'#92400e':'#1e40af'}">${order.orderType==='return'?'반품':'교환'}</span>` : '';
  const now = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  popup.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="font-size:1.5rem">🔔</span>
      <div style="flex:1">
        <div style="font-weight:800;font-size:.95rem;color:var(--ky)">새 주문 접수!</div>
        <div style="font-size:.72rem;color:#6b7280">${now}</div>
      </div>
    </div>
    <div style="font-weight:700;font-size:.98rem;margin-bottom:3px">${order.dealerName}${typeTag}</div>
    <div style="font-size:.82rem;color:#374151;margin-bottom:12px">${itemsText}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-family:monospace;font-size:1.05rem;font-weight:800;color:var(--ky)">${fmt(order.total)}원</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button onclick="document.getElementById('newOrderPopup').remove()"
        style="padding:9px;border-radius:8px;border:1.5px solid #d1d5db;background:#fff;cursor:pointer;font-size:.85rem;font-weight:600">
        닫기
      </button>
      <button onclick="document.getElementById('newOrderPopup').remove(); filterByDealer('${order.dealerName}');"
        style="padding:9px;border-radius:8px;border:none;background:var(--ky);color:#fff;cursor:pointer;font-size:.85rem;font-weight:700">
        ✅ 확인
      </button>
    </div>
  `;
  document.body.appendChild(popup);
  // ★ 자동 닫힘 없음 - 확인/닫기 버튼으로만 닫힘
}

function filterByDealer(name){
  const sel = document.getElementById('fDealer');
  if(sel){
    sel.value = name;
    applyFilter();
  }
}

window.addEventListener('DOMContentLoaded', () => {
  // SW 등록 — github.io 배포환경에서만
  if('serviceWorker' in navigator){
    const swPath = location.hostname.endsWith('github.io') ? '/KY-order/sw.js' : '/sw.js';
    navigator.serviceWorker.register(swPath + '?v=20260414-netlify1')
      .then(r => console.log('[KY Admin SW] 등록:', r.scope))
      .catch(e => console.log('[KY Admin SW] 스킵:', e.message));
  }
  // 세션 복원 시도
  const saved = sessionStorage.getItem(ADMIN_SESSION_KEY);
  if(saved){
    setAdminSession(saved);
    showAdminApp();
  } else {
    // ★ 자동 코드 입력: 이전 로그인 코드가 있으면 자동 채움
    const savedCode = localStorage.getItem('ky_admin_saved_code') || '';
    if(savedCode){
      const inp = document.getElementById('adminCodeInput');
      if(inp) inp.value = savedCode;
    }
  }
});
</script>
</div><!-- #adminMainApp -->
</body>
</html>
